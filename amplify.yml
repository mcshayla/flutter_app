version: 1
frontend:
  phases:
    preBuild:
      commands:
        - git clone https://github.com/flutter/flutter.git --branch stable --depth 1 $HOME/flutter
        - export PATH="$PATH:$HOME/flutter/bin"
        - flutter precache --web
        - flutter pub get
    build:
      commands:
        - export PATH="$PATH:$HOME/flutter/bin"
        - flutter build web --base-href /app/
  artifacts:
    baseDirectory: build/web
    files:
      - '**/*'
  cache:
    paths:
      - ~/.pub-cache/**/*
      - ~/flutter/**/*
