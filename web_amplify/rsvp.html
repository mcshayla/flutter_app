<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RSVP – easiYESt</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Montserrat', 'Segoe UI', sans-serif;
      background: #F8F5F0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 60px;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 36px 32px;
      width: 100%;
      max-width: 480px;
      box-shadow: 0 2px 24px rgba(123,63,97,0.08);
    }

    .logo {
      text-align: center;
      margin-bottom: 8px;
    }

    .logo span {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 28px;
      color: #7B3F61;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .tagline {
      text-align: center;
      font-size: 13px;
      color: #6E6E6E;
      margin-bottom: 28px;
    }

    h1 {
      font-family: Georgia, serif;
      font-size: 22px;
      color: #7B3F61;
      margin-bottom: 20px;
      text-align: center;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #7B3F61;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"],
    textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #DCC7AA;
      border-radius: 10px;
      font-size: 14px;
      font-family: inherit;
      color: #3E3E3E;
      background: #fff;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus {
      border-color: #7B3F61;
    }

    textarea { resize: vertical; min-height: 80px; }

    .name-row {
      display: flex;
      gap: 12px;
    }

    .name-row .field { flex: 1; }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .checkbox-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #7B3F61;
      cursor: pointer;
    }

    .checkbox-row label {
      font-size: 14px;
      font-weight: 500;
      text-transform: none;
      letter-spacing: 0;
      color: #3E3E3E;
      cursor: pointer;
      margin: 0;
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: #7B3F61;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }

    .submit-btn:hover { background: #6a3454; }
    .submit-btn:disabled { background: #b08ea0; cursor: default; }

    .error-msg {
      background: #fdecea;
      color: #c0392b;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .success-screen {
      text-align: center;
      padding: 20px 0;
    }

    .success-screen .icon {
      font-size: 56px;
      margin-bottom: 12px;
    }

    .success-screen h2 {
      font-family: Georgia, serif;
      font-size: 24px;
      color: #7B3F61;
      margin-bottom: 8px;
    }

    .success-screen p {
      font-size: 14px;
      color: #6E6E6E;
      line-height: 1.6;
    }

    .loading {
      text-align: center;
      padding: 48px 0;
      color: #6E6E6E;
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 28px;
      height: 28px;
      border: 3px solid #DCC7AA;
      border-top-color: #7B3F61;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .invalid-screen {
      text-align: center;
      padding: 20px 0;
      color: #6E6E6E;
      font-size: 14px;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="logo"><span>easiYESt</span></div>
  <div class="tagline">Wedding guest collection</div>

  <!-- Loading state -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <div>Loading your invitation...</div>
  </div>

  <!-- Invalid link -->
  <div id="invalid" class="invalid-screen" style="display:none">
    <div style="font-size:48px;margin-bottom:12px">🔗</div>
    <h2 style="font-family:Georgia,serif;font-size:20px;color:#7B3F61;margin-bottom:8px">Link not found</h2>
    <p>This RSVP link is invalid or has expired.<br>Please contact the couple for a new link.</p>
  </div>

  <!-- Form -->
  <div id="form-section" style="display:none">
    <h1 id="couple-heading">You're Invited!</h1>
    <div id="error-msg" class="error-msg" style="display:none"></div>

    <form id="rsvp-form" onsubmit="submitForm(event)">
      <div class="name-row">
        <div class="field">
          <label for="first_name">First Name *</label>
          <input type="text" id="first_name" name="first_name" required placeholder="Jane" />
        </div>
        <div class="field">
          <label for="last_name">Last Name</label>
          <input type="text" id="last_name" name="last_name" placeholder="Smith" />
        </div>
      </div>

      <div class="field" id="field-email" style="display:none">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="jane@example.com" />
      </div>

      <div class="field" id="field-phone" style="display:none">
        <label for="phone">Phone</label>
        <input type="tel" id="phone" name="phone" placeholder="+1 (555) 000-0000" />
      </div>

      <div class="field" id="field-address" style="display:none">
        <label for="address">Mailing Address</label>
        <textarea id="address" name="address"
          placeholder="Street, City, State, ZIP&#10;Country (if international)"></textarea>
      </div>

      <div class="field" id="field-dietary" style="display:none">
        <label for="dietary_restrictions">Dietary Restrictions</label>
        <input type="text" id="dietary_restrictions" name="dietary_restrictions"
          placeholder="e.g. vegetarian, nut allergy..." />
      </div>

      <div class="field" id="field-meal" style="display:none">
        <label for="meal_preference">Meal Preference</label>
        <input type="text" id="meal_preference" name="meal_preference"
          placeholder="e.g. chicken, fish, vegetarian..." />
      </div>

      <div class="field" id="field-plus_one" style="display:none">
        <label for="plus_one_count">How many additional guests are you bringing?</label>
        <input type="number" id="plus_one_count" name="plus_one_count"
          min="0" max="10" value="0"
          style="width:100%;padding:11px 14px;border:1.5px solid #DCC7AA;border-radius:10px;font-size:14px;font-family:inherit;color:#3E3E3E;" />
      </div>

      <div class="field" id="field-notes" style="display:none">
        <label for="notes">Message / Notes</label>
        <textarea id="notes" name="notes" placeholder="Anything you'd like the couple to know..."></textarea>
      </div>

      <button type="submit" class="submit-btn" id="submit-btn">Send RSVP</button>
    </form>
  </div>

  <!-- Success -->
  <div id="success" class="success-screen" style="display:none">
    <div class="icon">💍</div>
    <h2>You're on the list!</h2>
    <p>Thanks for submitting your details.<br>We can't wait to celebrate with you!</p>
  </div>
</div>

<script>
  // ── CONFIG ────────────────────────────────────────────────────────────────
  const SUPABASE_URL  = 'https://cocmclecxanepyheygqs.supabase.co'
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNvY21jbGVjeGFuZXB5aGV5Z3FzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjI1MjIwNTIsImV4cCI6MjA3ODA5ODA1Mn0.hBXFO-suxe26o6mqtoX5O6kIwuK8oVKC3A5cPK3EarA'
  const EDGE_FN_URL   = `${SUPABASE_URL}/functions/v1/submit-rsvp`
  // ─────────────────────────────────────────────────────────────────────────

  let token = null
  let fieldsEnabled = {}

  function show(id) {
    ['loading', 'invalid', 'form-section', 'success'].forEach(s => {
      document.getElementById(s).style.display = s === id ? '' : 'none'
    })
  }

  async function loadConfig() {
    const params = new URLSearchParams(window.location.search)
    token = params.get('token')

    if (!token) { show('invalid'); return }

    try {
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/guest_link_configs?token=eq.${encodeURIComponent(token)}&select=fields_enabled,partner1_name,partner2_name`,
        { headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}` } }
      )
      const data = await res.json()
      if (!Array.isArray(data) || data.length === 0) { show('invalid'); return }

      fieldsEnabled = data[0].fields_enabled ?? {}

      const p1 = (data[0].partner1_name ?? '').trim()
      const p2 = (data[0].partner2_name ?? '').trim()
      if (p1 || p2) {
        const names = [p1, p2].filter(Boolean).join(' & ')
        document.getElementById('couple-heading').textContent = `You're invited to celebrate ${names}!`
      }

      applyFields()
      show('form-section')
    } catch (e) {
      console.error(e)
      show('invalid')
    }
  }

  function applyFields() {
    const map = { email: 'field-email', phone: 'field-phone', address: 'field-address',
                  dietary: 'field-dietary', meal: 'field-meal', notes: 'field-notes',
                  plus_one: 'field-plus_one' }
    for (const [key, elId] of Object.entries(map)) {
      document.getElementById(elId).style.display = fieldsEnabled[key] ? '' : 'none'
    }
  }

  async function submitForm(e) {
    e.preventDefault()
    const btn = document.getElementById('submit-btn')
    const errEl = document.getElementById('error-msg')
    errEl.style.display = 'none'
    btn.disabled = true
    btn.textContent = 'Sending...'

    const payload = {
      token,
      first_name: document.getElementById('first_name').value,
      last_name:  document.getElementById('last_name').value,
    }

    if (fieldsEnabled.email)    payload.email                = document.getElementById('email').value
    if (fieldsEnabled.phone)    payload.phone                = document.getElementById('phone').value
    if (fieldsEnabled.address)  payload.address              = document.getElementById('address').value
    if (fieldsEnabled.dietary)  payload.dietary_restrictions = document.getElementById('dietary_restrictions').value
    if (fieldsEnabled.meal)     payload.meal_preference      = document.getElementById('meal_preference').value
    if (fieldsEnabled.notes)    payload.notes                = document.getElementById('notes').value
    if (fieldsEnabled.plus_one) {
      payload.plus_one_count = document.getElementById('plus_one_count').value
    }

    try {
      const res = await fetch(EDGE_FN_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON },
        body: JSON.stringify(payload),
      })
      const result = await res.json()

      if (result.success) {
        show('success')
      } else {
        errEl.textContent = result.error ?? 'Something went wrong. Please try again.'
        errEl.style.display = ''
        btn.disabled = false
        btn.textContent = 'Send RSVP'
      }
    } catch (err) {
      errEl.textContent = 'Network error. Please check your connection and try again.'
      errEl.style.display = ''
      btn.disabled = false
      btn.textContent = 'Send RSVP'
    }
  }

  loadConfig()
</script>
</body>
</html>
